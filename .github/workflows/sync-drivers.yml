name: Sync driver bindings

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go/go.mod
          cache-dependency-path: src/go/go.sum

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          install.packages(c("remotes", "adbi", "adbcdrivermanager", "DBI"))
        shell: Rscript {0}

      - name: Build and install dbc package
        run: R CMD INSTALL .

      - name: Regenerate driver bindings
        run: |
          Rscript -e 'dbc:::update_drivers()'

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet R/drivers-generated.R NAMESPACE && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR if bindings changed
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ci/sync-drivers-$(date +%Y%m%d)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add R/drivers-generated.R NAMESPACE
          git commit -m "chore: sync driver bindings from dbc registry"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: sync driver bindings from dbc registry" \
            --body "Automated update: \`dbc::update_drivers()\` detected new or changed drivers in the registry." \
            --base main \
            --head "$BRANCH"
